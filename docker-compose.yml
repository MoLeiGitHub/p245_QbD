services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qbd
      POSTGRES_USER: qbd
      POSTGRES_PASSWORD: qbd
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://qbd:qbd@db:5432/qbd
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  pg_data:
